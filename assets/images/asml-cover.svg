<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400">
  <rect width="640" height="400" fill="#0b1e36"/>

  <!-- concentric lens / aperture motif, evoking lithography optics -->
  <g fill="none" stroke="#a67c27" stroke-width="1.5" opacity="0.85">
    <circle cx="440" cy="180" r="160"/>
    <circle cx="440" cy="180" r="120"/>
    <circle cx="440" cy="180" r="80"/>
    <circle cx="440" cy="180" r="40"/>
  </g>

  <!-- fine radial lines, circuit-like -->
  <g stroke="#f4ecdc" stroke-width="1" opacity="0.25">
    <line x1="440" y1="0" x2="440" y2="400"/>
    <line x1="240" y1="180" x2="640" y2="180"/>
  </g>

  <text x="40" y="330" font-family="Georgia, serif" font-size="15" letter-spacing="0.5" fill="#f4ecdc">ASML</text>
  <text x="40" y="352" font-family="'IBM Plex Mono', monospace" font-size="11" letter-spacing="1" fill="#a67c27">VALUE CHAIN</text>
</svg>
